<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <section>
    <div class="login-box">
      <form id="signupForm">
        <h2>SIGNUP/REGISTER</h2>

        <div class="input-box">
          <span class="icon"><ion-icon name="person"></ion-icon></span>
          <input type="text" id="fullname" placeholder=" " required>
          <label>Full Name</label>
        </div>

        <div class="input-box">
          <span class="icon"><ion-icon name="mail"></ion-icon></span>
          <input type="email" id="email" placeholder=" " required>
          <label>Email</label>
        </div>

        <div class="input-box">
          <span class="icon"><ion-icon name="call"></ion-icon></span>
          <input type="tel" id="phone" placeholder=" ">
          <label>Phone Number (Optional)</label>
        </div>

        <!-- NEW FIELD ADDED -->
        <div class="input-box">
          <span class="icon"><ion-icon name="document-text"></ion-icon></span>
          <input type="file" id="license" placeholder=" " required>
          <label>Professional License Copy</label>
        </div>

        <div class="input-box">
          <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
          <input type="password" id="password" placeholder=" " required>
          <label>Password</label>
        </div>

        <div class="terms-agreement"
          style="margin: 20px 0; display: flex; align-items: flex-start; gap: 10px; color: #fff; font-size: 0.85em;">
          <input type="checkbox" id="termsCheckbox" required
            style="width: 18px; height: 18px; cursor: pointer; margin-top: 2px;">
          <label for="termsCheckbox" style="cursor: pointer; line-height: 1.4;">
            I agree to the <a href="terms.html" target="_blank"
              style="color: hsl(182, 100%, 70%); text-decoration: underline;">Terms of Use & Professional Use Agreement</a>.
          </label>
        </div>

        <button type="submit">Register</button>

        <div class="register-link">
          <p>Already have an account?
            <a href="#" onclick="const p=new URLSearchParams(window.location.search); const s=p.get('sid')||p.get('join')||''; window.location.href='login.html'+(s?'?sid='+s:''); return false;">Login</a>
          </p>
        </div>
      </form>
      <div id="successMessage" style="display: none; color: white; text-align: center;">
        <h3 style="margin-bottom: 10px;">Registration Submitted</h3>
        <p>Your license has been submitted for verification. You will be informed via email once you are approved to
          sign in to the website.</p>
      </div>
    </div>
  </section>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const checkbox = document.getElementById('termsCheckbox');
      if (!checkbox.checked) {
        alert('You must agree to the Terms of Use & Professional Use Agreement to proceed.');
        return;
      }

      const fullname = document.getElementById('fullname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const license = document.getElementById('license').files[0];

      // Detect role from URL (e.g. ?role=patient)
      const urlParams = new URLSearchParams(window.location.search);
      const role = urlParams.get('role') || 'therapist';

      try {
        const response = await fetch('/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            password,
            full_name: fullname,
            role: role,
            license_data: license ? license.name : ''
          })
        });
        
        if (response.ok) {
          this.style.display = 'none';
          document.getElementById('successMessage').style.display = 'block';
          // After success, wait 3s and go to login with SID
          setTimeout(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const sid = urlParams.get('sid') || urlParams.get('join') || '';
            const sidParam = sid ? `?sid=${sid}` : "";
            window.location.href = 'login.html' + sidParam;
          }, 3000);
        } else {
          const data = await response.json();
          alert('Registration failed: ' + (data.detail || 'Unknown error'));
        }
      } catch (err) {
        console.error(err);
        alert('An error occurred during registration.');
      }
    });
  </script>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
