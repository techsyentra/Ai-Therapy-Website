<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <section>
    <div class="login-box">
      <form id="loginForm">
        <h2>Login</h2>

        <div class="input-box">
          <span class="icon"><ion-icon name="mail"></ion-icon></span>
          <input type="email" id="email" placeholder=" " required>
          <label>Email</label>
        </div>

        <div class="input-box">
          <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
          <input type="password" id="password" placeholder=" " required>
          <label>Password</label>
        </div>

        <div class="remember-forget">
          <label><input type="checkbox"> Remember Me</label>
          <a href="#">Forgot Password</a>
        </div>

        <button type="submit">Login</button>

        <div class="register-link">
          <p>Don't have an account?
            <a href="#" onclick="const p=new URLSearchParams(window.location.search); const s=p.get('sid')||p.get('join')||''; window.location.href='signup.html'+(s?'?sid='+s:''); return false;">Register</a>
          </p>
        </div>
      </form>
    </div>
  </section>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem('access_token', data.access_token);
          const urlParams = new URLSearchParams(window.location.search);
          const sid = urlParams.get('sid') || urlParams.get('join') || '';
          const sidParam = sid ? `?sid=${sid}` : "";
          window.location.href = '/dashboard/' + sidParam;
        } else {
          alert('Login failed: ' + (data.detail || 'Unknown error'));
        }
      } catch (err) {
        console.error(err);
        alert('An error occurred during login.');
      }
    });
  </script>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
